format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
${custom.prompt_symbol}"""

[character]
disabled = true

[custom.prompt_symbol]
command = 'printf "%s" "$STARSHIP_PROMPT_SYMBOL"'
when = 'test -n "$STARSHIP_PROMPT_SYMBOL"'
format = '[$output]($style) '
style = 'bold green'