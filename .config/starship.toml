format = """
$time\
$hostname\
$username\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
${custom.prompt_symbol}"""

[time]
disabled = false
time_format = "%Y-%m-%d_%H:%M:%S"
format = '[$time]($style) '
style = "bold yellow"

[hostname]
ssh_only = false
format = 'on [$hostname]($style) '
style = "bold cyan"

[character]
disabled = true

[custom.prompt_symbol]
command = 'printf "%s" "$STARSHIP_PROMPT_SYMBOL"'
when = 'test -n "$STARSHIP_PROMPT_SYMBOL"'
format = '[$output]($style) '
style = 'bold green'